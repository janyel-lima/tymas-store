# ════════════════════════════════════════════════════════
#  docker-compose.yml — Stack Completa de Produção
#  Serviços: backend (Express+SQLite), bot (Telegraf), frontend (Nginx)
#  Otimizado para AWS EC2 t3.micro (1GB RAM)
# ════════════════════════════════════════════════════════

services:
  # ── Backend: Express + SQLite ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mp-telegram-backend:latest
    container_name: mp-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/payments.db
      # FIX: sem esta linha o backend usa o padrão 'http://localhost:3001',
      # que não resolve na rede Docker interna. O webhook aprovaria o pagamento
      # no banco mas nunca chamaria o bot → assinatura nunca ativada.
      - BOT_INTERNAL_URL=http://bot:3001
      # FIX: BACKEND_URL vem do .env (ex: https://api.seudominio.com).
      # O compose injeta aqui explicitamente para garantir que o server.js
      # use o valor correto ao montar notification_url e back_urls do MP.
      - BACKEND_URL=${BACKEND_URL}
    volumes:
      - ./backend/data:/app/data
    ports:
      - '3000:3000'
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 250M
        reservations:
          memory: 128M
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── Bot: Telegraf + better-sqlite3 ─────────────────────
  bot:
    build:
      context: ./bot-one
      dockerfile: Dockerfile
    image: mp-telegram-bot:latest
    container_name: mp-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/subscriptions.db
      - API_PORT=3001
    volumes:
      - ./bot-one/data:/app/data
    ports:
      # API interna do bot acessível apenas via rede interna Docker
      - '127.0.0.1:3001:3001'
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 64M
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── Frontend: Vue 3 servido via Nginx ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${BACKEND_URL}
        VITE_FRONTEND_URL: ${FRONTEND_URL}
        VITE_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    image: mp-telegram-frontend:latest
    container_name: mp-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '80:80'
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 32M
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

# ── Rede interna isolada ────────────────────────────────
networks:
  app-network:
    driver: bridge
    name: mp-telegram-network
