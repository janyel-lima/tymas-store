# /etc/nginx/conf.d/default.conf
# Configuração para Vue Router no modo History (HTML5)

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão Gzip para assets estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss application/json
               image/svg+xml;

    # Cache longo para assets com hash (JS/CSS gerados pelo Vite)
    location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Roteamento Vue Router: qualquer rota desconhecida → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Página de erro customizada (opcional)
    error_page 404 /index.html;
}
