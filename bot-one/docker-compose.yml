version: "3.9"

# ════════════════════════════════════════════════════════
#  docker-compose.yml — Bot de Assinaturas Telegram
# ════════════════════════════════════════════════════════

services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: subscription-bot:latest
    container_name: subscription-bot
    restart: unless-stopped

    # Variáveis de ambiente carregadas do .env local
    env_file:
      - .env

    environment:
      - NODE_ENV=production
      # Sobrescreve DB_PATH para apontar ao volume montado
      - DB_PATH=/app/data/subscriptions.db

    volumes:
      # Persiste o arquivo SQLite fora do container
      # Os dados NÃO são perdidos ao recriar o container
      - ./data:/app/data

    ports:
      # Expõe a API interna apenas localmente (ou via proxy reverso)
      # Formato: "HOST:CONTAINER"
      - "127.0.0.1:3001:3001"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
