# ════════════════════════════════════════════════════════
#  gateway/nginx.dev.conf — Roteamento interno Dev
#  Um único túnel ngrok expõe frontend + backend
#  na mesma URL pública.
#
#  Roteamento:
#    /api/*              → backend:3000 (Express)
#    /health             → backend:3000
#    /falha /pendente    → backend:3000 (páginas estáticas)
#    /*                  → frontend:5173 (Vite + HMR)
# ════════════════════════════════════════════════════════

server {
    listen 8080;

    # ── Aumenta o tamanho máximo de body (webhooks do MP) ──────
    client_max_body_size 1m;

    # ── API e webhook → backend ────────────────────────────────
    location /api/ {
        proxy_pass          http://backend:3000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  30s;
        proxy_connect_timeout 10s;
    }

    # ── Páginas estáticas e health servidos pelo backend ───────
    location ~ ^/(falha|pendente|health) {
        proxy_pass          http://backend:3000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── Frontend Vue (Vite dev server com HMR via WebSocket) ───
    location / {
        proxy_pass          http://frontend:5173;
        proxy_set_header    Host              $host;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_http_version  1.1;
        # Timeout longo para HMR não cair
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
